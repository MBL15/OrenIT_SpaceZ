# API и SPA на одном origin: запросы к бэкенду — на upstream, остальное — статика + SPA fallback.
upstream api_backend {
    server api:8000;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Собранные ассеты Vite
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Совпадает с proxy в vite.config.js — всё это уходит в FastAPI
    location ~ ^/(auth|parent-gate|parent_mode|lessons|me|parent|practice|shop|leaderboard|users|teacher|admin|classes|health|achievements|docs|openapi\.json|redoc)(/|$) {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
